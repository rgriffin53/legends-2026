<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 USA Women's Legends | Interactive Team Guide</title>

  <style>
    /* =========================================================
       2026 USA Women's Legends — Interactive Team Guide
       Sprint 0: Architectural Foundation
       ========================================================= */

    /* ---------- Design Tokens ---------- */
    :root {
      --color-navy-950: #071426;
      --color-navy-900: #0b1f3a;
      --color-navy-800: #102f57;
      --color-navy-700: #17406f;
      --color-red-600: #c82127;
      --color-red-700: #a7191f;
      --color-white: #ffffff;
      --color-slate-50: #f8fafc;
      --color-slate-100: #eef2f7;
      --color-slate-200: #d9e1ec;
      --color-slate-500: #67758a;
      --color-slate-700: #334155;
      --shadow-card: 0 18px 45px rgba(0, 0, 0, 0.18);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 9px;
      --max-width: 1180px;
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
    }

    /* ---------- Base ---------- */
    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--color-navy-950);
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--color-slate-700);
      background:
        radial-gradient(circle at top left, rgba(200, 33, 39, 0.17), transparent 32rem),
        linear-gradient(180deg, var(--color-navy-900), var(--color-navy-950));
      line-height: 1.5;
    }

    button {
      font: inherit;
    }

    /* ---------- App Shell ---------- */
    .app-shell {
      width: min(100% - 2rem, var(--max-width));
      margin: 0 auto;
      padding: var(--space-6) 0 var(--space-10);
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: var(--space-5);
      padding: var(--space-5);
      color: var(--color-white);
    }

    .app-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 132px;
      min-width: 132px;
      height: 74px;
      overflow: hidden;
      border-radius: var(--radius-md);
      background: transparent;
    }

    .app-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .app-title-group {
      min-width: 0;
    }

    .app-title {
      margin: 0;
      font-size: clamp(1.55rem, 3vw, 2.35rem);
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .app-subtitle {
      margin: var(--space-2) 0 0;
      color: rgba(255, 255, 255, 0.76);
      font-size: clamp(0.95rem, 2vw, 1.08rem);
    }

    /* ---------- Primary Navigation ---------- */
    .primary-nav {
      display: flex;
      gap: var(--space-3);
      padding: var(--space-3);
      margin: 0 0 var(--space-5);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
    }

    .primary-nav__button {
      flex: 1;
      border: 0;
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-5);
      color: rgba(255, 255, 255, 0.84);
      background: transparent;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: 0.01em;
      transition: background-color 140ms ease, color 140ms ease;
    }

    .primary-nav__button:hover,
    .primary-nav__button:focus-visible {
      outline: none;
      color: var(--color-white);
      background: rgba(255, 255, 255, 0.11);
    }

    .primary-nav__button.is-active {
      color: var(--color-navy-900);
      background: var(--color-white);
    }

    /* ---------- Shared Panels ---------- */
    .view {
      display: none;
    }

    .view.is-active {
      display: block;
    }

    .card {
      border-radius: var(--radius-lg);
      background: var(--color-white);
      box-shadow: var(--shadow-card);
    }

    .panel-header {
      padding: var(--space-6) var(--space-6) 0;
    }

    .eyebrow {
      margin: 0 0 var(--space-2);
      color: var(--color-red-600);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .panel-title {
      margin: 0;
      color: var(--color-navy-900);
      font-size: clamp(1.45rem, 3vw, 2rem);
      line-height: 1.15;
      letter-spacing: -0.035em;
    }

    .placeholder-note {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      margin-top: var(--space-5);
      padding: var(--space-3) var(--space-4);
      border: 1px dashed var(--color-red-600);
      border-radius: 999px;
      color: var(--color-red-700);
      background: #fff5f5;
      font-size: 0.92rem;
      font-weight: 800;
    }

    /* ---------- North Star Framework ---------- */
    .north-star-card {
      overflow: hidden;
    }

    .secondary-nav {
      display: flex;
      gap: var(--space-2);
      margin: var(--space-6) var(--space-6) 0;
      padding: var(--space-2);
      border-radius: var(--radius-md);
      background: var(--color-slate-100);
      overflow-x: auto;
    }

    .secondary-nav__button {
      flex: 0 0 auto;
      border: 0;
      border-radius: var(--radius-sm);
      padding: var(--space-3) var(--space-4);
      color: var(--color-slate-700);
      background: transparent;
      cursor: pointer;
      font-weight: 800;
      white-space: nowrap;
    }

    .secondary-nav__button.is-active {
      color: var(--color-white);
      background: var(--color-navy-800);
    }

    .north-star-content {
      padding: var(--space-6);
    }

    .content-stack {
      display: grid;
      gap: var(--space-5);
    }

    .placeholder-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-4);
    }

    .placeholder-card {
      min-height: 116px;
      padding: var(--space-5);
      border: 1px solid var(--color-slate-200);
      border-radius: var(--radius-md);
      background: var(--color-slate-50);
    }

    .placeholder-card h3 {
      margin: 0 0 var(--space-2);
      color: var(--color-navy-900);
      font-size: 1rem;
    }

    .placeholder-card p {
      margin: 0;
      color: var(--color-slate-500);
    }

    /* ---------- Static Rink Placeholder ---------- */
    .rink-frame {
      display: grid;
      gap: var(--space-3);
      width: 100%;
    }

    .rink-placeholder {
      width: min(100%, 1120px);
      aspect-ratio: 200 / 85;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      border-radius: 8% / 22%;
      background:
        linear-gradient(90deg, rgba(16, 47, 87, 0.025), rgba(255, 255, 255, 0.96) 20%, rgba(255, 255, 255, 0.96) 80%, rgba(16, 47, 87, 0.025)),
        var(--color-white);
      box-shadow:
        inset 0 0 0 3px rgba(7, 20, 38, 0.92),
        0 14px 34px rgba(7, 20, 38, 0.08);
    }

    .rink-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      opacity: 0.52;
    }

    .rink-zone-labels {
      position: absolute;
      inset: 12% 7%;
      display: grid;
      grid-template-columns: 37.5fr 25fr 37.5fr;
      gap: clamp(0.45rem, 1.4vw, 1.1rem);
      text-align: center;
      pointer-events: none;
    }

    .rink-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: clamp(96px, 22vw, 210px);
      padding: clamp(0.65rem, 1.8vw, 1.25rem);
      border: 1px solid rgba(16, 47, 87, 0.10);
      border-radius: clamp(0.8rem, 1.8vw, 1.35rem);
      color: var(--color-navy-800);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: clamp(0.66rem, 1.2vw, 0.88rem);
      background: rgba(255, 255, 255, 0.70);
      backdrop-filter: blur(1px);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.58);
    }

    .rink-zone span {
      display: block;
      margin-top: 0.45rem;
      color: var(--color-slate-700);
      font-weight: 700;
      text-transform: none;
      letter-spacing: 0;
      line-height: 1.25;
      font-size: clamp(0.64rem, 1.05vw, 0.78rem);
    }

    .rink-zone--defensive {
      background: rgba(16, 47, 87, 0.075);
    }

    .rink-zone--neutral {
      background: rgba(255, 255, 255, 0.78);
    }

    .rink-zone--offensive {
      background: rgba(200, 33, 39, 0.055);
    }

    .rink-direction {
      width: min(100%, 1120px);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: var(--space-3);
      color: var(--color-red-700);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.78rem;
    }

    .rink-direction span {
      padding: 0 var(--space-2);
    }

    /* ---------- Systems Framework ---------- */
    .systems-layout {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
      gap: var(--space-5);
      align-items: start;
    }

    .systems-sidebar {
      position: sticky;
      top: var(--space-5);
      max-height: calc(100vh - (var(--space-5) * 2));
      overflow-y: auto;
      overscroll-behavior-y: auto;
      padding: var(--space-4);
      align-self: start;
      scrollbar-gutter: stable;
    }

    .systems-group + .systems-group {
      margin-top: var(--space-6);
      padding-top: var(--space-6);
      border-top: 1px solid var(--color-slate-200);
    }

    .systems-group__title {
      margin: 0 0 var(--space-3);
      color: var(--color-red-600);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .systems-nav {
      display: grid;
      gap: var(--space-2);
    }

    .systems-nav__button {
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      padding: 0.7rem 0.85rem;
      color: var(--color-slate-700);
      background: transparent;
      cursor: pointer;
      text-align: left;
      font-weight: 750;
      line-height: 1.2;
    }

    .systems-nav__button:hover,
    .systems-nav__button:focus-visible {
      outline: none;
      border-color: var(--color-slate-200);
      background: var(--color-slate-50);
    }

    .systems-nav__button.is-active {
      color: var(--color-white);
      background: var(--color-navy-800);
    }

    .systems-content {
      min-height: 520px;
      padding: var(--space-6);
    }

    .systems-placeholder-box {
      display: grid;
      place-items: center;
      min-height: 280px;
      margin-top: var(--space-6);
      border: 2px dashed var(--color-slate-200);
      border-radius: var(--radius-lg);
      background: var(--color-slate-50);
      color: var(--color-slate-500);
      text-align: center;
      padding: var(--space-8);
    }

    .systems-placeholder-box strong {
      display: block;
      margin-bottom: var(--space-2);
      color: var(--color-navy-900);
      font-size: 1.1rem;
    }

    /* ---------- Responsive Layout ---------- */
    @media (max-width: 820px) {
      .app-shell {
        width: min(100% - 1rem, var(--max-width));
        padding-top: var(--space-3);
      }

      .app-header {
        align-items: flex-start;
        padding: var(--space-4) var(--space-2);
      }

      .app-logo {
        width: 84px;
        min-width: 84px;
        height: 48px;
      }

      .primary-nav {
        position: sticky;
        top: var(--space-2);
        z-index: 10;
      }

      .secondary-nav {
        margin-inline: var(--space-4);
      }

      .panel-header,
      .north-star-content,
      .systems-content {
        padding-inline: var(--space-4);
      }

      .placeholder-grid {
        grid-template-columns: 1fr;
      }

      .systems-layout {
        grid-template-columns: 1fr;
      }

      .systems-sidebar {
        position: static;
        max-height: none;
        overflow: visible;
        padding: var(--space-4);
      }

      .systems-nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }


    @media (max-height: 720px) and (min-width: 821px) {
      .systems-sidebar {
        top: var(--space-3);
        max-height: calc(100vh - (var(--space-3) * 2));
      }

      .systems-nav__button {
        padding-block: 0.62rem;
      }
    }

    @media (max-width: 520px) {
      .app-header {
        gap: var(--space-3);
      }

      .primary-nav {
        flex-direction: column;
      }

      .systems-nav {
        grid-template-columns: 1fr;
      }

      .rink-placeholder {
        aspect-ratio: 200 / 100;
        border-radius: 9% / 22%;
      }

      .rink-zone-labels {
        inset: 14% 6%;
        gap: var(--space-2);
      }

      .rink-zone {
        min-height: 74px;
        padding: var(--space-2);
        font-size: 0.6rem;
      }

      .rink-zone span {
        display: none;
      }

      .rink-direction {
        font-size: 0.68rem;
      }
    }
  </style>
</head>

                <div class="rink-zone-labels">
                  <div class="rink-zone rink-zone--defensive">Defensive Zone<span>Space for principles &amp; cues</span></div>
                  <div class="rink-zone rink-zone--neutral">Neutral Zone<span>Space for principles &amp; cues</span></div>
                  <div class="rink-zone rink-zone--offensive">Offensive Zone<span>Space for principles &amp; cues</span></div>
                </div>
              </div>
              <div class="rink-direction" aria-hidden="true">
                <span>Defend ←</span>
                <span>Attack →</span>
              </div>
            </div>
            <span class="placeholder-note">Rink principles and interactions will be added later</span>
          </div>
        `;
        return;
      }

      const cards = section.items.map((item) => `
        <div class="placeholder-card">
          <h3>${item.title}</h3>
          <p>${item.text}</p>
        </div>
      `).join("");

      contentEl.innerHTML = `
        <div class="content-stack">
          <div>
            <p class="eyebrow">North Star Placeholder</p>
            <h3 class="panel-title">${section.title}</h3>
          </div>
          <div class="placeholder-grid">${cards}</div>
        </div>
      `;
    }

    function renderSystemsNavigation() {
      const mainNav = document.getElementById("systems-nav-main");
      const referenceNav = document.getElementById("systems-nav-reference");

      mainNav.innerHTML = systemItems.map((item) => systemButtonTemplate(item)).join("");
      referenceNav.innerHTML = referenceItems.map((item) => systemButtonTemplate(item)).join("");

      document.querySelectorAll("[data-system-target]").forEach((button) => {
        button.addEventListener("click", () => {
          appState.activeSystem = button.dataset.systemTarget;
          renderSystemsContent();
          setActiveButton("[data-system-target]", "systemTarget", appState.activeSystem);
        });
      });

      setActiveButton("[data-system-target]", "systemTarget", appState.activeSystem);
    }

    function systemButtonTemplate(item) {
      return `
        <button class="systems-nav__button" type="button" data-system-target="${item.id}">
          ${item.label}
        </button>
      `;
    }

    function renderSystemsContent() {
      const allItems = [...systemItems, ...referenceItems];
      const activeItem = allItems.find((item) => item.id === appState.activeSystem);
      const contentPanel = document.getElementById("systems-content-panel");

      contentPanel.innerHTML = `
        <div class="systems-placeholder-box">
          <div>
            <strong>${activeItem.label}</strong>
            <p>This is a placeholder content panel.</p>
            <p>The coaching objective, rink animation, cues, and breakdowns will be built in later sprints.</p>
          </div>
        </div>
      `;
    }


    function bindSystemsSidebarScrollChaining() {
      const sidebar = document.querySelector(".systems-sidebar");
      if (!sidebar) return;

      sidebar.addEventListener("wheel", (event) => {
        const canScrollInternally = sidebar.scrollHeight > sidebar.clientHeight;
        if (!canScrollInternally) return;

        const scrollingDown = event.deltaY > 0;
        const scrollingUp = event.deltaY < 0;
        const atTop = sidebar.scrollTop <= 0;
        const atBottom = Math.ceil(sidebar.scrollTop + sidebar.clientHeight) >= sidebar.scrollHeight;

        if ((scrollingDown && atBottom) || (scrollingUp && atTop)) {
          event.preventDefault();
          window.scrollBy({
            top: event.deltaY,
            left: 0,
            behavior: "auto"
          });
        }
      }, { passive: false });
    }

    /* =========================================================
       Event Binding
       ========================================================= */
    function bindPrimaryNavigation() {
      document.querySelectorAll("[data-primary-target]").forEach((button) => {
        button.addEventListener("click", () => {
          appState.activePrimary = button.dataset.primaryTarget;
          updatePrimaryView();
        });
      });
    }

    function bindNorthStarNavigation() {
      document.querySelectorAll("[data-north-star-target]").forEach((button) => {
        button.addEventListener("click", () => {
          appState.activeNorthStar = button.dataset.northStarTarget;
          setActiveButton("[data-north-star-target]", "northStarTarget", appState.activeNorthStar);
          renderNorthStarContent();
        });
      });
    }

    function updatePrimaryView() {
      document.querySelectorAll(".view").forEach((view) => {
        view.classList.remove("is-active");
      });

      document.getElementById(`view-${appState.activePrimary}`).classList.add("is-active");
      setActiveButton("[data-primary-target]", "primaryTarget", appState.activePrimary);
    }

    /* =========================================================
       App Initialization
       ========================================================= */
    function initApp() {
      bindPrimaryNavigation();
      bindNorthStarNavigation();
      bindSystemsSidebarScrollChaining();
      renderNorthStarContent();
      renderSystemsNavigation();
      renderSystemsContent();
      updatePrimaryView();
    }

    initApp();
  </script>
</body>
</html>
