<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 USA Women's Legends | Interactive Team Guide</title>

  <style>
    /* =========================================================
       2026 USA Women's Legends — Interactive Team Guide
       ========================================================= */

    /* ---------- Design Tokens ---------- */
    :root {
      --color-navy-950: #071426;
      --color-navy-900: #0b1f3a;
      --color-navy-800: #102f57;
      --color-navy-700: #17406f;
      --color-red-600: #c82127;
      --color-red-700: #a7191f;
      --color-white: #ffffff;
      --color-slate-50: #f8fafc;
      --color-slate-100: #eef2f7;
      --color-slate-200: #d9e1ec;
      --color-slate-500: #67758a;
      --color-slate-700: #334155;
      --shadow-card: 0 18px 45px rgba(0, 0, 0, 0.18);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 9px;
      --max-width: 1180px;
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
    }

    /* ---------- Base ---------- */
    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--color-navy-950);
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--color-slate-700);
      background:
        radial-gradient(circle at top left, rgba(200, 33, 39, 0.17), transparent 32rem),
        linear-gradient(180deg, var(--color-navy-900), var(--color-navy-950));
      line-height: 1.5;
    }

    button {
      font: inherit;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ---------- App Shell ---------- */
    .app-shell {
      width: min(100% - 2rem, var(--max-width));
      margin: 0 auto;
      padding: var(--space-6) 0 var(--space-10);
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: var(--space-5);
      padding: var(--space-5);
      color: var(--color-white);
    }

    .app-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 132px;
      min-width: 132px;
      height: 74px;
      overflow: hidden;
      border-radius: var(--radius-md);
      background: transparent;
    }

    .app-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .app-title-group {
      min-width: 0;
    }

    .app-title {
      margin: 0;
      font-size: clamp(1.55rem, 3vw, 2.35rem);
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .app-subtitle {
      margin: var(--space-2) 0 0;
      color: rgba(255, 255, 255, 0.76);
      font-size: clamp(0.95rem, 2vw, 1.08rem);
    }

    /* ---------- Primary Navigation ---------- */
    .primary-nav {
      display: flex;
      gap: var(--space-3);
      padding: var(--space-3);
      margin: 0 0 var(--space-5);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
    }

    .primary-nav__button {
      flex: 1;
      border: 0;
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-5);
      color: rgba(255, 255, 255, 0.84);
      background: transparent;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: 0.01em;
      transition: background-color 140ms ease, color 140ms ease;
    }

    .primary-nav__button:hover,
    .primary-nav__button:focus-visible {
      outline: none;
      color: var(--color-white);
      background: rgba(255, 255, 255, 0.11);
    }

    .primary-nav__button.is-active {
      color: var(--color-navy-900);
      background: var(--color-white);
    }

    /* ---------- Shared Panels ---------- */
    .view {
      display: none;
    }

    .view.is-active {
      display: block;
    }

    .card {
      border-radius: var(--radius-lg);
      background: var(--color-white);
      box-shadow: var(--shadow-card);
    }

    .panel-header {
      padding: var(--space-6) var(--space-6) 0;
    }

    .eyebrow {
      margin: 0 0 var(--space-2);
      color: var(--color-red-600);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .panel-title {
      margin: 0;
      color: var(--color-navy-900);
      font-size: clamp(1.45rem, 3vw, 2rem);
      line-height: 1.15;
      letter-spacing: -0.035em;
    }

    .placeholder-note {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      margin-top: var(--space-5);
      padding: var(--space-3) var(--space-4);
      border: 1px dashed var(--color-red-600);
      border-radius: 999px;
      color: var(--color-red-700);
      background: #fff5f5;
      font-size: 0.92rem;
      font-weight: 800;
    }

    /* ---------- North Star Framework ---------- */
    .north-star-card {
      overflow: hidden;
    }

    .secondary-nav {
      display: flex;
      gap: var(--space-2);
      margin: var(--space-6) var(--space-6) 0;
      padding: var(--space-2);
      border-radius: var(--radius-md);
      background: var(--color-slate-100);
      overflow-x: auto;
    }

    .secondary-nav__button {
      flex: 0 0 auto;
      border: 0;
      border-radius: var(--radius-sm);
      padding: var(--space-3) var(--space-4);
      color: var(--color-slate-700);
      background: transparent;
      cursor: pointer;
      font-weight: 800;
      white-space: nowrap;
    }

    .secondary-nav__button.is-active {
      color: var(--color-white);
      background: var(--color-navy-800);
    }

    .north-star-content {
      padding: var(--space-6);
      /*
        Keep North Star tabs at a stable page height so switching from a taller
        Mindset rink view to shorter card views does not force a jarring scroll clamp.
      */
      min-height: clamp(560px, 66vh, 760px);
    }

    .content-stack {
      display: grid;
      gap: var(--space-5);
    }

    .placeholder-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-4);
    }

    .placeholder-card {
      min-height: 116px;
      padding: var(--space-5);
      border: 1px solid var(--color-slate-200);
      border-radius: var(--radius-md);
      background: var(--color-slate-50);
    }

    .placeholder-card h3 {
      margin: 0 0 var(--space-2);
      color: var(--color-navy-900);
      font-size: 1rem;
    }

    .placeholder-card p {
      margin: 0;
      color: var(--color-slate-500);
    }


    .principle-intro {
      max-width: 920px;
      margin: var(--space-3) 0 0;
      color: var(--color-slate-500);
      font-size: 1rem;
    }

    .principle-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-4);
    }

    .principle-card {
      position: relative;
      min-height: 230px;
      padding: var(--space-6);
      border: 1px solid rgba(217, 225, 236, 0.92);
      border-radius: var(--radius-lg);
      background:
        linear-gradient(180deg, rgba(248, 250, 252, 0.98), rgba(255, 255, 255, 1));
      box-shadow: 0 14px 32px rgba(7, 20, 38, 0.08);
      overflow: hidden;
    }

    .principle-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 5px;
      background: linear-gradient(90deg, var(--color-red-600), var(--color-navy-800));
    }

    .principle-card__number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.15rem;
      height: 2.15rem;
      margin-bottom: var(--space-4);
      border-radius: 999px;
      color: var(--color-white);
      background: var(--color-navy-800);
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.04em;
    }

    .principle-card h3 {
      margin: 0 0 var(--space-3);
      color: var(--color-navy-900);
      font-size: 1.16rem;
      line-height: 1.15;
      letter-spacing: -0.025em;
    }

    .principle-card p {
      margin: 0;
      color: var(--color-slate-700);
      font-size: 0.9rem;
    }

    .principle-tagline {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      margin-top: var(--space-5);
      padding: var(--space-2) var(--space-3);
      border-radius: 999px;
      color: var(--color-red-700);
      background: #fff5f5;
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }


    /* ---------- Static Rink Placeholder ---------- */
    .rink-frame {
      display: grid;
      gap: var(--space-3);
      width: 100%;
    }

    .rink-placeholder {
      width: min(100%, 1120px);
      aspect-ratio: 200 / 85;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      border-radius: 8% / 22%;
      background:
        linear-gradient(90deg, rgba(16, 47, 87, 0.025), rgba(255, 255, 255, 0.96) 20%, rgba(255, 255, 255, 0.96) 80%, rgba(16, 47, 87, 0.025)),
        var(--color-white);
      box-shadow:
        inset 0 0 0 3px rgba(7, 20, 38, 0.92),
        0 14px 34px rgba(7, 20, 38, 0.08);
    }

    .rink-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      opacity: 0.52;
    }

    .rink-zone-labels {
      position: absolute;
      inset: 12% 7%;
      display: grid;
      grid-template-columns: 31fr 38fr 31fr;
      gap: clamp(0.45rem, 1.4vw, 1.1rem);
      text-align: center;
      pointer-events: none;
    }

    .rink-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: clamp(96px, 22vw, 210px);
      padding: clamp(0.65rem, 1.8vw, 1.25rem);
      border: 1px solid rgba(16, 47, 87, 0.10);
      border-radius: clamp(0.8rem, 1.8vw, 1.35rem);
      color: var(--color-navy-800);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: clamp(0.66rem, 1.2vw, 0.88rem);
      background: rgba(255, 255, 255, 0.70);
      backdrop-filter: blur(1px);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.58);
    }

    .rink-zone span {
      display: block;
      margin-top: 0.45rem;
      color: var(--color-slate-700);
      font-weight: 700;
      text-transform: none;
      letter-spacing: 0;
      line-height: 1.25;
      font-size: clamp(0.64rem, 1.05vw, 0.78rem);
    }

    .rink-zone--defensive {
      background: rgba(16, 47, 87, 0.075);
    }

    .rink-zone--neutral {
      background: rgba(255, 255, 255, 0.78);
    }

    .rink-zone--offensive {
      background: rgba(200, 33, 39, 0.055);
    }

    .rink-direction {
      width: min(100%, 1120px);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: var(--space-3);
      color: var(--color-red-700);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.78rem;
    }

    .rink-direction span {
      padding: 0 var(--space-2);
    }


    /* ---------- Mindset: With the Ball ---------- */
    .transition-banner {
      display: grid;
      gap: var(--space-2);
      width: 100%;
      padding: var(--space-5);
      border: 1px solid rgba(200, 33, 39, 0.22);
      border-left: 6px solid var(--color-red-600);
      border-radius: var(--radius-lg);
      color: var(--color-white);
      background:
        linear-gradient(135deg, rgba(200, 33, 39, 0.98), rgba(16, 47, 87, 0.98));
      box-shadow: 0 16px 34px rgba(7, 20, 38, 0.15);
    }

    .transition-banner h4 {
      margin: 0;
      font-size: clamp(1.25rem, 2.6vw, 1.7rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .transition-banner p {
      max-width: none;
      margin: 0;
      color: rgba(255, 255, 255, 0.91);
      font-size: clamp(0.98rem, 1.7vw, 1.12rem);
      font-weight: 750;
    }

    .mindset-rink {
      width: min(100%, 1120px);
      height: clamp(620px, 62vw, 760px);
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      border-radius: 8% / 14%;
      border: 3px solid rgba(7, 20, 38, 0.96);
      background:
        linear-gradient(90deg,
          rgba(37, 99, 235, 0.30) 0 33.333%,
          rgba(100, 116, 139, 0.34) 33.333% 66.666%,
          rgba(220, 38, 38, 0.21) 66.666% 100%),
        var(--color-white);
      box-shadow: 0 14px 34px rgba(7, 20, 38, 0.08);
    }

    .mindset-rink::before,
    .mindset-rink::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      z-index: 0;
      width: 3px;
      background: rgba(16, 47, 87, 0.88);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.45);
    }

    .mindset-rink::before {
      left: 33.333%;
    }

    .mindset-rink::after {
      left: 66.666%;
    }

    .mindset-rink .rink-svg {
      display: none;
    }

    .mindset-zone-panels {
      position: relative;
      z-index: 1;
      height: 100%;
      padding: clamp(1.15rem, 2.2vw, 1.65rem);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
    }

    .mindset-zone-card {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      margin-inline: clamp(0.45rem, 1vw, 0.75rem);
      padding: clamp(0.85rem, 1.35vw, 1.05rem);
      border: 1px solid rgba(16, 47, 87, 0.14);
      border-radius: clamp(0.85rem, 1.7vw, 1.25rem);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.64);
    }

    .mindset-zone-card--defensive {
      background: rgba(191, 219, 254, 0.92);
      border-color: rgba(37, 99, 235, 0.26);
    }

    .mindset-zone-card--neutral {
      background: rgba(226, 232, 240, 0.96);
      border-color: rgba(71, 85, 105, 0.22);
    }

    .mindset-zone-card--offensive {
      background: rgba(254, 226, 226, 0.92);
      border-color: rgba(200, 33, 39, 0.22);
    }

    .mindset-zone-name {
      margin: 0 0 var(--space-2);
      color: var(--color-navy-800);
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .mindset-zone-objective {
      margin: 0 0 var(--space-3);
      padding: var(--space-3);
      border-radius: var(--radius-md);
      color: var(--color-navy-900);
      background: rgba(255, 255, 255, 0.86);
      font-size: clamp(1.2rem, 2.35vw, 1.95rem);
      font-weight: 950;
      line-height: 1;
      letter-spacing: -0.055em;
      text-align: center;
      box-shadow: 0 8px 18px rgba(7, 20, 38, 0.08);
    }

    .mindset-principles {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 0.7rem;
      margin-top: auto;
    }

    .mindset-principle {
      min-height: 0;
      border: 1px solid rgba(217, 225, 236, 0.94);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.92);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 7px 16px rgba(7, 20, 38, 0.055);
    }

    .mindset-principle__button {
      width: 100%;
      min-height: 42px;
      border: 0;
      padding: 0.66rem 0.82rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      color: var(--color-navy-900);
      background: transparent;
      cursor: pointer;
      text-align: left;
      font-size: 0.98rem;
      font-weight: 900;
      line-height: 1.15;
      transition: font-size 160ms ease, min-height 160ms ease, background-color 140ms ease;
    }

    .mindset-principle:not(.is-expanded) .mindset-principle__button {
      flex: 1;
      min-height: 100%;
      font-size: clamp(0.98rem, 1.25vw, 1.12rem);
    }

    .mindset-principle__button:hover,
    .mindset-principle__button:focus-visible {
      outline: none;
      background: var(--color-slate-50);
    }

    .mindset-principle__icon {
      flex: 0 0 auto;
      width: 1.25rem;
      height: 1.25rem;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      color: var(--color-white);
      background: #15803d;
      font-weight: 950;
      line-height: 1;
      box-shadow: 0 0 0 3px rgba(21, 128, 61, 0.14);
      transition: transform 160ms ease, background-color 160ms ease, box-shadow 160ms ease;
    }

    .mindset-principle:not(.is-expanded) .mindset-principle__button:hover .mindset-principle__icon,
    .mindset-principle:not(.is-expanded) .mindset-principle__button:focus-visible .mindset-principle__icon {
      transform: scale(1.08);
      box-shadow: 0 0 0 5px rgba(21, 128, 61, 0.18);
    }

    .mindset-principle.is-expanded .mindset-principle__icon {
      background: var(--color-red-600);
      box-shadow: 0 0 0 3px rgba(200, 33, 39, 0.14);
    }

    .mindset-principle__body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: none;
      scrollbar-gutter: stable;
    }

    .mindset-principle.is-expanded .mindset-principle__body {
      display: block;
    }

    .mindset-principle__body-inner {
      padding: 0.1rem 0.82rem 1.45rem;
      color: var(--color-slate-700);
      font-size: clamp(0.78rem, 0.95vw, 0.89rem);
      line-height: 1.42;
    }

    .mindset-principle__body-inner p {
      margin: 0;
    }


    /* ---------- Systems Framework ---------- */
    .systems-layout {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
      gap: var(--space-5);
      align-items: start;
    }

    .systems-sidebar {
      position: sticky;
      top: var(--space-5);
      max-height: calc(100vh - (var(--space-5) * 2));
      overflow-y: auto;
      overscroll-behavior-y: auto;
      padding: var(--space-4);
      align-self: start;
      scrollbar-gutter: stable;
    }

    .systems-group + .systems-group {
      margin-top: var(--space-6);
      padding-top: var(--space-6);
      border-top: 1px solid var(--color-slate-200);
    }

    .systems-group__title {
      margin: 0 0 var(--space-3);
      color: var(--color-red-600);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .systems-nav {
      display: grid;
      gap: var(--space-2);
    }

    .systems-nav__button {
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      padding: 0.7rem 0.85rem;
      color: var(--color-slate-700);
      background: transparent;
      cursor: pointer;
      text-align: left;
      font-weight: 750;
      line-height: 1.2;
    }

    .systems-nav__button:hover,
    .systems-nav__button:focus-visible {
      outline: none;
      border-color: var(--color-slate-200);
      background: var(--color-slate-50);
    }

    .systems-nav__button.is-active {
      color: var(--color-white);
      background: var(--color-navy-800);
    }

    .systems-content {
      min-width: 0;
      min-height: 520px;
      padding: var(--space-6);
      overflow-x: clip;
    }

    .systems-mobile-picker {
      display: none;
      margin: var(--space-5) 0 var(--space-2);
      padding: var(--space-4);
      border: 1px solid var(--color-slate-200);
      border-radius: var(--radius-md);
      background: var(--color-slate-50);
    }

    .systems-mobile-picker__label {
      display: block;
      margin: 0 0 var(--space-2);
      color: var(--color-red-600);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .systems-mobile-picker__select {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--color-slate-200);
      border-radius: var(--radius-sm);
      padding: 0.72rem 0.85rem;
      color: var(--color-navy-900);
      background: var(--color-white);
      font: inherit;
      font-weight: 800;
    }

    .systems-mobile-picker__hint {
      margin: var(--space-2) 0 0;
      color: var(--color-slate-500);
      font-size: 0.88rem;
    }

    .systems-placeholder-box {
      display: grid;
      place-items: center;
      min-height: 280px;
      margin-top: var(--space-6);
      border: 2px dashed var(--color-slate-200);
      border-radius: var(--radius-lg);
      background: var(--color-slate-50);
      color: var(--color-slate-500);
      text-align: center;
      padding: var(--space-8);
    }

    .systems-placeholder-box strong {
      display: block;
      margin-bottom: var(--space-2);
      color: var(--color-navy-900);
      font-size: 1.1rem;
    }



    /* ---------- Neutral-Zone Trap Storyboard ---------- */
    .system-storyboard {
      min-width: 0;
      width: 100%;
      display: grid;
      gap: var(--space-5);
      margin-top: var(--space-6);
    }

    .system-storyboard__header {
      display: grid;
      gap: var(--space-2);
    }

    .system-storyboard__title {
      margin: 0;
      color: var(--color-navy-900);
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      line-height: 1.05;
      letter-spacing: -0.045em;
    }

    .system-storyboard__objective {
      max-width: 900px;
      margin: 0;
      color: var(--color-slate-700);
      font-size: clamp(0.98rem, 1.7vw, 1.12rem);
      font-weight: 650;
    }

    .storyboard-divider {
      height: 1px;
      background: var(--color-slate-200);
    }

    .storyboard-nav {
      display: grid;
      justify-items: center;
      gap: 0.45rem;
    }

    .storyboard-nav__row {
      width: min(100%, 310px);
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) 34px;
      align-items: center;
      gap: var(--space-2);
    }

    .storyboard-nav__button {
      width: 34px;
      height: 34px;
      border: 1px solid var(--color-slate-200);
      border-radius: 999px;
      color: var(--color-navy-900);
      background: var(--color-white);
      cursor: pointer;
      font-size: 1rem;
      font-weight: 900;
      line-height: 1;
      transition: background-color 140ms ease, color 140ms ease;
    }

    .storyboard-nav__button:hover,
    .storyboard-nav__button:focus-visible {
      outline: none;
      color: var(--color-white);
      background: var(--color-navy-800);
    }

    .storyboard-nav__button:disabled {
      cursor: not-allowed;
      opacity: 0.32;
    }

    .storyboard-nav__indicator {
      margin: 0;
      color: var(--color-navy-900);
      text-align: center;
      font-size: 0.88rem;
      font-weight: 900;
    }

    .storyboard-nav__dots {
      display: flex;
      justify-content: center;
      gap: 0.55rem;
    }

    .storyboard-nav__dot {
      width: 9px;
      height: 9px;
      border: 1.5px solid var(--color-navy-800);
      border-radius: 999px;
      padding: 0;
      background: transparent;
      cursor: pointer;
      transition: transform 140ms ease, background-color 140ms ease;
    }

    .storyboard-nav__dot:hover,
    .storyboard-nav__dot:focus-visible {
      outline: 3px solid rgba(23, 64, 111, 0.14);
      outline-offset: 2px;
      transform: scale(1.1);
    }

    .storyboard-nav__dot.is-active {
      background: var(--color-navy-800);
    }

    .storyboard-frame {
      min-width: 0;
      width: 100%;
      display: grid;
      gap: var(--space-4);
      animation: storyboardFade 160ms ease-out;
    }

    @keyframes storyboardFade {
      from { opacity: 0.45; }
      to { opacity: 1; }
    }

    .storyboard-key-objective {
      display: grid;
      gap: 0.25rem;
      padding: 0.8rem 1rem;
      border: 1px solid var(--color-slate-200);
      border-left: 4px solid var(--color-red-600);
      border-radius: var(--radius-md);
      background: var(--color-slate-50);
    }

    .storyboard-key-objective__label,
    .storyboard-section__label {
      margin: 0;
      color: var(--color-red-600);
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .storyboard-key-objective__text {
      margin: 0;
      color: var(--color-navy-900);
      font-size: clamp(0.98rem, 1.7vw, 1.12rem);
      font-weight: 850;
      line-height: 1.3;
    }

    .storyboard-diagram {
      min-width: 0;
      width: 100%;
      max-width: 100%;
      margin: 0;
      border: 1px solid var(--color-slate-200);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--color-slate-50);
      box-shadow: 0 14px 30px rgba(7, 20, 38, 0.09);
    }

    .storyboard-diagram img {
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
    }

    .storyboard-zone-labels {
      display: grid;
      grid-template-columns: 1fr 1.35fr 1fr;
      gap: var(--space-2);
      margin-top: -0.25rem;
      padding-inline: var(--space-2);
      color: var(--color-slate-500);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-align: center;
      text-transform: uppercase;
    }

    .storyboard-zone-labels span + span {
      border-left: 1px solid var(--color-slate-200);
    }

    .storyboard-player-section {
      display: grid;
      gap: 0.55rem;
    }

    .storyboard-player-options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      gap: 0.65rem;
    }

    .player-coaching-option {
      min-width: 0;
      border: 1px solid var(--color-slate-200);
      border-radius: var(--radius-md);
      background: var(--color-slate-50);
      overflow: hidden;
    }

    .player-coaching-option--focus {
      border-color: rgba(200, 33, 39, 0.34);
      background: linear-gradient(135deg, rgba(200, 33, 39, 0.055), rgba(248, 250, 252, 1));
    }

    .player-coaching-option.is-active {
      border-color: var(--color-navy-800);
      box-shadow: 0 0 0 2px rgba(23, 64, 111, 0.12);
    }

    .player-coaching-option--focus.is-active {
      border-color: var(--color-red-600);
      box-shadow: 0 0 0 2px rgba(200, 33, 39, 0.11);
    }

    .player-coaching-option__button {
      width: 100%;
      min-height: 58px;
      border: 0;
      padding: 0.65rem 0.75rem;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: var(--space-2);
      color: var(--color-navy-900);
      background: transparent;
      cursor: pointer;
      text-align: left;
    }

    .player-coaching-option__button:hover,
    .player-coaching-option__button:focus-visible {
      outline: none;
      background: rgba(255, 255, 255, 0.76);
    }

    .player-coaching-option__identity {
      min-width: 0;
      display: grid;
      gap: 0.05rem;
    }

    .player-coaching-option__name {
      font-size: 0.98rem;
      font-weight: 900;
      line-height: 1.1;
    }

    .player-coaching-option__hint {
      color: var(--color-slate-500);
      font-size: 0.72rem;
      font-weight: 750;
      line-height: 1.15;
    }

    .player-coaching-option__icon {
      flex: 0 0 auto;
      width: 1.45rem;
      height: 1.45rem;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      color: var(--color-white);
      background: var(--color-navy-800);
      font-size: 0.82rem;
      font-weight: 900;
      line-height: 1;
      transition: transform 140ms ease;
    }

    .player-coaching-option--focus .player-coaching-option__icon {
      background: var(--color-red-600);
    }

    .player-coaching-option.is-active .player-coaching-option__icon {
      transform: rotate(180deg);
    }

    .player-coaching-detail {
      padding: 0.8rem 0.95rem;
      border: 1px solid var(--color-slate-200);
      border-radius: var(--radius-md);
      background: var(--color-white);
      box-shadow: 0 8px 20px rgba(7, 20, 38, 0.06);
    }

    .player-coaching-detail--focus {
      border-left: 4px solid var(--color-red-600);
      background: linear-gradient(135deg, rgba(200, 33, 39, 0.045), rgba(255, 255, 255, 1));
    }

    .player-coaching-detail__name {
      margin: 0 0 0.2rem;
      color: var(--color-navy-900);
      font-size: 0.98rem;
      font-weight: 900;
    }

    .player-coaching-detail__point {
      margin: 0;
      color: var(--color-slate-700);
      font-size: 0.91rem;
      line-height: 1.42;
    }

    /* ---------- Storyboard Position Selector + Fixed Coaching Panel ---------- */
    .storyboard-frame-heading {
      display: flex;
      align-items: baseline;
      gap: 0.55rem;
      padding: 0.72rem 0.95rem;
      border-left: 4px solid var(--color-red-600);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      background: var(--color-slate-50);
    }

    .storyboard-frame-heading__title {
      margin: 0;
      color: var(--color-navy-900);
      font-size: clamp(1rem, 1.7vw, 1.15rem);
      font-weight: 900;
      line-height: 1.25;
    }

    .storyboard-coaching-layout {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(250px, 0.9fr) minmax(320px, 1.35fr);
      gap: var(--space-4);
      align-items: stretch;
    }

    .storyboard-position-panel {
      display: grid;
      gap: var(--space-4);
      align-content: start;
    }

    .storyboard-player-section {
      display: grid;
      gap: 0.5rem;
    }

    .storyboard-player-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.55rem;
    }

    .player-selector {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--color-slate-200);
      border-radius: var(--radius-md);
      padding: 0.5rem 0.65rem;
      display: flex;
      align-items: baseline;
      gap: 0.45rem;
      color: var(--color-navy-900);
      background: var(--color-slate-50);
      cursor: pointer;
      text-align: left;
      transition: border-color 140ms ease, background-color 140ms ease, box-shadow 140ms ease;
    }

    .player-selector:hover,
    .player-selector:focus-visible {
      outline: none;
      border-color: var(--color-navy-700);
      background: var(--color-white);
      box-shadow: 0 0 0 3px rgba(23, 64, 111, 0.1);
    }

    .player-selector--focus {
      border-color: rgba(200, 33, 39, 0.32);
      background: rgba(200, 33, 39, 0.045);
    }

    .player-selector--focus:hover,
    .player-selector--focus:focus-visible {
      border-color: var(--color-red-600);
      box-shadow: 0 0 0 3px rgba(200, 33, 39, 0.09);
    }

    .player-selector.is-active {
      color: var(--color-white);
      border-color: var(--color-navy-800);
      background: var(--color-navy-800);
      box-shadow: 0 0 0 3px rgba(23, 64, 111, 0.12);
    }

    .player-selector--focus.is-active {
      border-color: var(--color-red-600);
      background: var(--color-red-600);
      box-shadow: 0 0 0 3px rgba(200, 33, 39, 0.11);
    }

    .player-selector__name {
      flex: 0 0 auto;
      font-size: 0.95rem;
      font-weight: 950;
      line-height: 1.1;
    }

    .player-selector__cue {
      min-width: 0;
      color: var(--color-slate-500);
      font-size: 0.72rem;
      font-weight: 800;
      line-height: 1.15;
    }

    .player-selector.is-active .player-selector__cue {
      color: rgba(255, 255, 255, 0.82);
    }

    .coaching-notebook {
      min-height: 100%;
      padding: var(--space-5);
      border: 1px solid var(--color-slate-200);
      border-left: 5px solid var(--color-navy-800);
      border-radius: var(--radius-lg);
      background:
        repeating-linear-gradient(
          180deg,
          rgba(16, 47, 87, 0.035) 0,
          rgba(16, 47, 87, 0.035) 1px,
          transparent 1px,
          transparent 30px
        ),
        var(--color-white);
      box-shadow: 0 10px 24px rgba(7, 20, 38, 0.07);
    }

    .coaching-notebook__header {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--color-slate-200);
    }

    .coaching-notebook__icon {
      font-size: 1.25rem;
      line-height: 1;
    }

    .coaching-notebook__title {
      margin: 0;
      color: var(--color-navy-900);
      font-size: 0.8rem;
      font-weight: 950;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .coaching-notebook__player {
      margin: 0 0 0.45rem;
      color: var(--color-red-700);
      font-size: 1.05rem;
      font-weight: 950;
    }

    .coaching-notebook__point,
    .coaching-notebook__prompt {
      margin: 0;
      color: var(--color-slate-700);
      font-size: 0.95rem;
      line-height: 1.55;
    }

    .coaching-notebook__prompt {
      color: var(--color-slate-500);
      font-style: italic;
    }

    .systems-nav__button {
      display: flex;
      align-items: flex-start;
      gap: 0.55rem;
    }

    .systems-nav__status {
      flex: 0 0 auto;
      line-height: 1.15;
    }

    .systems-nav__label {
      min-width: 0;
    }

    .systems-wip-banner {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: var(--space-3);
      align-items: start;
      width: 100%;
      padding: var(--space-5);
      border: 1px solid #f2cf7a;
      border-radius: var(--radius-lg);
      color: var(--color-navy-900);
      background: #fff9e9;
      text-align: left;
    }

    .systems-wip-banner__icon {
      font-size: 1.45rem;
      line-height: 1;
    }

    .systems-wip-banner strong {
      display: block;
      margin-bottom: 0.2rem;
      color: var(--color-navy-900);
      font-size: 1.05rem;
    }

    .systems-wip-banner p {
      margin: 0;
      color: var(--color-slate-700);
    }

    /* ---------- On-Dek Communication Reference ---------- */
    .communication-reference {
      min-width: 0;
      width: 100%;
      display: grid;
      gap: var(--space-5);
      margin-top: var(--space-6);
    }

    .communication-reference__header {
      display: grid;
      gap: var(--space-4);
    }

    .communication-reference__title {
      margin: 0;
      color: var(--color-navy-900);
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      line-height: 1.05;
      letter-spacing: -0.045em;
    }

    .communication-reference__principle {
      margin: 0;
      padding: var(--space-5);
      border-left: 5px solid var(--color-red-600);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      color: var(--color-navy-900);
      background: var(--color-slate-50);
      font-size: clamp(1.15rem, 2.4vw, 1.5rem);
      font-weight: 900;
      line-height: 1.3;
      letter-spacing: -0.025em;
    }

    .communication-reference__intro {
      margin: 0;
      color: var(--color-slate-700);
      font-size: 1rem;
      line-height: 1.55;
    }

    .communication-reference__grid {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-4);
    }

    .communication-reference__section {
      min-width: 0;
      padding: var(--space-5);
      border: 1px solid var(--color-slate-200);
      border-radius: var(--radius-lg);
      background: var(--color-white);
      box-shadow: 0 10px 24px rgba(7, 20, 38, 0.06);
    }

    .communication-reference__section--full {
      grid-column: 1 / -1;
    }

    .communication-reference__section h3 {
      margin: 0 0 var(--space-4);
      color: var(--color-navy-900);
      font-size: 1.12rem;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .communication-reference__section > p {
      margin: 0 0 var(--space-4);
      color: var(--color-slate-700);
      line-height: 1.55;
    }

    .communication-reference__section > p:last-child {
      margin-bottom: 0;
    }

    .communication-reference__terms {
      display: grid;
      grid-template-columns: minmax(90px, auto) minmax(0, 1fr);
      gap: 0;
      margin: 0;
    }

    .communication-reference__terms dt,
    .communication-reference__terms dd {
      margin: 0;
      padding: 0.62rem 0;
      border-top: 1px solid var(--color-slate-200);
    }

    .communication-reference__terms dt:first-of-type,
    .communication-reference__terms dt:first-of-type + dd {
      border-top: 0;
      padding-top: 0;
    }

    .communication-reference__terms dt {
      padding-right: var(--space-4);
      color: var(--color-red-700);
      font-weight: 900;
      line-height: 1.35;
    }

    .communication-reference__terms dd {
      color: var(--color-slate-700);
      line-height: 1.45;
    }

    @media (max-width: 820px) {
      .communication-reference__grid {
        grid-template-columns: 1fr;
      }

      .communication-reference__section--full {
        grid-column: auto;
      }
    }

    @media (max-width: 520px) {
      .communication-reference__terms {
        grid-template-columns: 1fr;
      }

      .communication-reference__terms dt {
        padding-bottom: 0.15rem;
        padding-right: 0;
      }

      .communication-reference__terms dd {
        padding-top: 0;
        border-top: 0;
      }

      .communication-reference__terms dt:first-of-type + dd {
        padding-top: 0;
      }
    }


    /* ---------- Terminology Reference ---------- */
    .terminology-reference {
      min-width: 0;
      width: 100%;
      display: grid;
      gap: var(--space-5);
      margin-top: var(--space-6);
    }

    .terminology-reference__header {
      display: grid;
      gap: var(--space-2);
    }

    .terminology-reference__title {
      margin: 0;
      color: var(--color-navy-900);
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      line-height: 1.05;
      letter-spacing: -0.045em;
    }

    .terminology-reference__intro {
      max-width: 900px;
      margin: 0;
      color: var(--color-slate-700);
      font-size: clamp(0.98rem, 1.7vw, 1.12rem);
      line-height: 1.55;
    }

    .terminology-reference__rink {
      display: grid;
      gap: var(--space-3);
    }

    .terminology-reference__groups {
      display: grid;
      gap: var(--space-4);
    }

    .terminology-reference__group {
      border: 1px solid var(--color-slate-200);
      border-radius: var(--radius-lg);
      background: var(--color-white);
      box-shadow: 0 10px 24px rgba(7, 20, 38, 0.06);
      overflow: hidden;
    }

    .terminology-reference__group summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      padding: var(--space-5);
      color: var(--color-navy-900);
      cursor: pointer;
      font-size: 1.12rem;
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: -0.02em;
      list-style: none;
    }

    .terminology-reference__group summary::-webkit-details-marker {
      display: none;
    }

    .terminology-reference__group summary::after {
      content: "+";
      flex: 0 0 auto;
      width: 1.55rem;
      height: 1.55rem;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      color: var(--color-white);
      background: var(--color-red-600);
      font-size: 1rem;
      line-height: 1;
    }

    .terminology-reference__group[open] summary {
      border-bottom: 1px solid var(--color-slate-200);
      background: var(--color-slate-50);
    }

    .terminology-reference__group[open] summary::after {
      content: "−";
    }

    .terminology-reference__group summary:hover,
    .terminology-reference__group summary:focus-visible {
      outline: none;
      background: var(--color-slate-50);
    }

    .terminology-reference__terms {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-4);
      margin: 0;
      padding: var(--space-5);
    }

    .terminology-reference__term {
      min-width: 0;
      padding: var(--space-4);
      border-left: 4px solid var(--color-red-600);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      background: var(--color-slate-50);
    }

    .terminology-reference__term dt {
      margin: 0 0 var(--space-2);
      color: var(--color-navy-900);
      font-weight: 900;
      line-height: 1.3;
    }

    .terminology-reference__term dd {
      margin: 0;
      color: var(--color-slate-700);
      line-height: 1.5;
    }

    .terminology-reference__term dd p {
      margin: 0;
    }

    .terminology-reference__term dd p + p {
      margin-top: var(--space-3);
    }

    @media (max-width: 820px) {
      .terminology-reference__terms {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .storyboard-frame {
        animation: none;
      }

      .storyboard-nav__button,
      .storyboard-nav__dot {
        transition: none;
      }
    }

    /* ---------- Responsive Layout ---------- */
    /*
      The desktop Systems shell remains two columns down to 821px. At those
      intermediate widths, the coaching selector and notebook cannot safely
      remain side by side inside the narrower content column. Stack only those
      controls before the full mobile navigation breakpoint so the rink and all
      storyboard content stay contained by the white card.
    */
    @media (max-width: 1020px) and (min-width: 821px) {
      .storyboard-coaching-layout {
        grid-template-columns: minmax(0, 1fr);
      }

      .storyboard-position-panel,
      .coaching-notebook {
        min-width: 0;
      }
    }

    @media (max-width: 820px) {
      .app-shell {
        width: min(100% - 1rem, var(--max-width));
        padding-top: var(--space-3);
      }

      .app-header {
        align-items: flex-start;
        padding: var(--space-4) var(--space-2);
      }

      .app-logo {
        width: 84px;
        min-width: 84px;
        height: 48px;
      }

      .primary-nav {
        position: sticky;
        top: 0;
        z-index: 10;
        margin-inline: calc(var(--space-2) * -1);
        border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        border-color: rgba(255, 255, 255, 0.16);
        background: rgba(7, 20, 38, 0.97);
        box-shadow: 0 12px 26px rgba(7, 20, 38, 0.28);
        backdrop-filter: none;
      }

      .secondary-nav {

    function bindMindsetAccordions(container) {
      container.querySelectorAll(".mindset-principle__button").forEach((button) => {
        const principle = button.closest(".mindset-principle");

        button.addEventListener("click", () => {
          const isExpanded = button.getAttribute("aria-expanded") === "true";
          const nextExpanded = !isExpanded;
          button.setAttribute("aria-expanded", String(nextExpanded));
          principle.classList.toggle("is-expanded", nextExpanded);

          const icon = button.querySelector(".mindset-principle__icon");
          if (icon) {
            icon.textContent = nextExpanded ? "×" : "+";
          }
        });
      });
    }

      const mobileSelect = document.getElementById("systems-mobile-select");

      systemGroups.forEach((group) => {
        const groupNav = document.getElementById(group.navId);
        if (groupNav) {

      referenceNav.innerHTML = referenceItems.map((item) => systemButtonTemplate(item)).join("");

        mobileSelect.innerHTML = `

            <optgroup label="${group.label}">

          `).join("")}
          <optgroup label="Reference">
            ${referenceItems.map((item) => systemOptionTemplate(item)).join("")}
          </optgroup>

        mobileSelect.addEventListener("change", () => {
          appState.activeSystem = mobileSelect.value;
          renderSystemsContent();
          syncSystemsNavigation();
        });
      }

      document.querySelectorAll("[data-system-target]").forEach((button) => {
        button.addEventListener("click", () => {

      return `
        <button class="systems-nav__button" type="button" data-system-target="${item.id}">

        </button>

    }

    function systemOptionTemplate(item) {
      const isComplete = item.id === "neutral-zone-forecheck" || item.id === "d-zone-coverage" || item.id === "d-zone-breakout" || item.id === "d-zone-faceoff" || item.id === "backchecking" || item.id === "line-changes" || item.id === "o-zone-entry" || item.id === "o-zone-forecheck" || item.id === "o-zone-offense" || item.id === "o-zone-faceoff" || item.id === "communication" || item.id === "terminology";
      return `<option value="${item.id}">${isComplete ? "" : "🚧 "}${item.label}</option>`;

    function syncSystemsNavigation() {
      setActiveButton("[data-system-target]", "systemTarget", appState.activeSystem);

    function playerSelectorTemplate(player, group, index, selectedPlayerKey, systemKey, emphasis = false) {
      const playerKey = `${group}-${index}`;
      const isActive = selectedPlayerKey === playerKey;

      return `
        <button
          class="player-selector${emphasis ? " player-selector--focus" : ""}${isActive ? " is-active" : ""}"
          type="button"
          data-storyboard-player="${playerKey}"
          data-storyboard-system="${systemKey}"
          aria-pressed="${isActive}"
          aria-label="${player.player}: ${player.cue}. Show coach notes."
        >
          <span class="player-selector__name">${player.player}</span>
          <span class="player-selector__cue">${player.cue}</span>
        </button>
      `;
    }

    function selectedPlayerForStep(step, selectedKey) {
      if (!selectedKey) return null;

      const [group, indexText] = selectedKey.split("-");
      const players = group === "focus" ? step.focus : step.support;
      const player = players[Number(indexText)];

      return player ? { ...player, group } : null;
    }

    function coachingNotebookTemplate(step, selectedKey) {
      const selected = selectedPlayerForStep(step, selectedKey);

      return `
        <aside class="coaching-notebook" aria-live="polite" aria-label="Coach Notes">
          <div class="coaching-notebook__header">
            <span class="coaching-notebook__icon" aria-hidden="true">📒</span>
            <h4 class="coaching-notebook__title">Coach Notes</h4>
          </div>
          ${selected ? `
            <p class="coaching-notebook__player">${selected.player} · ${selected.cue}</p>
            <p class="coaching-notebook__point">${selected.point}</p>
          ` : `
            <p class="coaching-notebook__prompt">Select a position to view Coach Notes.</p>
          `}
        </aside>
      `;
    }

    function renderSystemStoryboard(config) {
      const {
        system,
        systemKey,
        stepStateKey,
        playerStateKey,
        headingId,
        ariaLabel,
        showZoneLabels = true,
        combinePlayers = false
      } = config;

      const steps = system.steps || system.frames;
      const stepIndex = appState[stepStateKey];
      const step = steps[stepIndex];
      const totalSteps = steps.length;
      const selectedPlayerKey = appState[playerStateKey];
      const contentPanel = document.getElementById("systems-content-panel");

      contentPanel.innerHTML = `
        <section class="system-storyboard" aria-labelledby="${headingId}">
          <header class="system-storyboard__header">
            <h3 id="${headingId}" class="system-storyboard__title">${system.title}</h3>
            <p class="system-storyboard__objective"><strong>Objective:</strong> ${system.objective}</p>
          </header>

          <div class="storyboard-divider" aria-hidden="true"></div>

          <nav class="storyboard-nav" aria-label="${ariaLabel} steps">
            <div class="storyboard-nav__row">
              <button class="storyboard-nav__button" type="button" data-storyboard-action="previous" aria-label="Previous step" ${stepIndex === 0 ? "disabled" : ""}>←</button>
              <p class="storyboard-nav__indicator">Step ${stepIndex + 1} of ${totalSteps}</p>
              <button class="storyboard-nav__button" type="button" data-storyboard-action="next" aria-label="Next step" ${stepIndex === totalSteps - 1 ? "disabled" : ""}>→</button>
            </div>
            <div class="storyboard-nav__dots" aria-label="Choose a step">
              ${steps.map((item, index) => `
                <button
                  class="storyboard-nav__dot${index === stepIndex ? " is-active" : ""}"
                  type="button"
                  data-storyboard-step="${index}"
                  aria-label="Go to step ${index + 1}: ${item.title}"
                  aria-current="${index === stepIndex ? "step" : "false"}"
                ></button>
              `).join("")}
            </div>
          </nav>

          <div class="storyboard-frame">
            <div class="storyboard-key-objective">
              <p class="storyboard-key-objective__text">${step.objective}</p>
            </div>

            <figure class="storyboard-diagram">
              <img src="${step.image}" alt="${step.imageAlt}">
            </figure>

            ${showZoneLabels ? `
              <div class="storyboard-zone-labels" aria-label="Rink orientation">
                <span>Defensive Zone</span>
                <span>Neutral Zone</span>
                <span>Offensive Zone</span>
              </div>
            ` : ""}

            <div class="storyboard-coaching-layout">
              <div class="storyboard-position-panel">
                ${combinePlayers ? `
                  <section class="storyboard-player-section" aria-labelledby="${systemKey}-players-title">
                    <h4 id="${systemKey}-players-title" class="storyboard-section__label">Players</h4>
                    <div class="storyboard-player-options">
                      ${step.focus.map((player, index) => playerSelectorTemplate(player, "focus", index, selectedPlayerKey, systemKey)).join("")}
                      ${step.support.map((player, index) => playerSelectorTemplate(player, "support", index, selectedPlayerKey, systemKey)).join("")}
                    </div>
                  </section>
                ` : `
                  <section class="storyboard-player-section" aria-labelledby="${systemKey}-focus-players-title">
                    <h4 id="${systemKey}-focus-players-title" class="storyboard-section__label">Focus Players</h4>
                    <div class="storyboard-player-options">
                      ${step.focus.map((player, index) => playerSelectorTemplate(player, "focus", index, selectedPlayerKey, systemKey, true)).join("")}
                    </div>
                  </section>

                  <section class="storyboard-player-section" aria-labelledby="${systemKey}-supporting-players-title">
                    <h4 id="${systemKey}-supporting-players-title" class="storyboard-section__label">Supporting Players</h4>
                    <div class="storyboard-player-options">
                      ${step.support.map((player, index) => playerSelectorTemplate(player, "support", index, selectedPlayerKey, systemKey)).join("")}
                    </div>
                  </section>
                `}
              </div>

              ${coachingNotebookTemplate(step, selectedPlayerKey)}
            </div>
          </div>
        </section>
      `;

      contentPanel.querySelectorAll("[data-storyboard-step]").forEach((button) => {
        button.addEventListener("click", () => {
          appState[stepStateKey] = Number(button.dataset.storyboardStep);
          appState[playerStateKey] = null;
          renderSystemStoryboard(config);
        });
      });

      contentPanel.querySelectorAll("[data-storyboard-action]").forEach((button) => {
        button.addEventListener("click", () => {
          const direction = button.dataset.storyboardAction === "next" ? 1 : -1;
          appState[stepStateKey] = Math.min(
            totalSteps - 1,
            Math.max(0, appState[stepStateKey] + direction)
          );
          appState[playerStateKey] = null;
          renderSystemStoryboard(config);
        });
      });

      contentPanel.querySelectorAll("[data-storyboard-player]").forEach((button) => {
        button.addEventListener("click", () => {
          const selectedPlayer = button.dataset.storyboardPlayer;
          appState[playerStateKey] =
            appState[playerStateKey] === selectedPlayer ? null : selectedPlayer;
          renderSystemStoryboard(config);
        });
      });
    }

    function renderTerminologyReference() {
      const contentPanel = document.getElementById("systems-content-panel");

      contentPanel.innerHTML = `
        <section class="terminology-reference" aria-labelledby="terminology-reference-title">
          <header class="terminology-reference__header">
            <p class="eyebrow">Reference</p>
            <h2 id="terminology-reference-title" class="terminology-reference__title">Terminology</h2>
            <p class="terminology-reference__intro">A quick reference for the rink locations, situational roles, and terms used throughout our systems.</p>
          </header>

          <div class="storyboard-divider"></div>

          <div class="terminology-reference__rink">
            <figure class="storyboard-diagram">
              <img src="assets/rink-terminology.png" alt="Full rink terminology diagram identifying the House, Front Door or Slot, High Slot, Half Wall, Point, Strong Side, and Weak Side." />
            </figure>
            <div class="storyboard-zone-labels" aria-label="Rink zones">
              <span>Defensive Zone</span>
              <span>Neutral Zone</span>
              <span>Offensive Zone</span>
            </div>
          </div>

          <div class="terminology-reference__groups">
            <details class="terminology-reference__group" open>
              <summary>Rink Diagram Terms</summary>
              <dl class="terminology-reference__terms">
                <div class="terminology-reference__term"><dt>Front Door (Slot)</dt><dd><p>The scoring area immediately in front of the goalie, inside the House.</p><p>Throughout the app, <strong>Front Door</strong> and <strong>Slot</strong> are used interchangeably.</p></dd></div>
                <div class="terminology-reference__term"><dt>Half Wall</dt><dd>The area along the boards between the corner and the Point.</dd></div>
                <div class="terminology-reference__term"><dt>High Slot</dt><dd>The area above the Front Door and farther from the net.</dd></div>
                <div class="terminology-reference__term"><dt>House</dt><dd>The dangerous scoring area in front of the net. Defensively, protecting the House is the highest priority.</dd></div>
                <div class="terminology-reference__term"><dt>Point</dt><dd>The area near the blue line along the boards.</dd></div>
                <div class="terminology-reference__term"><dt>Strong Side (Ball Side)</dt><dd>The side of the rink where the ball is located.</dd></div>
                <div class="terminology-reference__term"><dt>Weak Side (Far Side)</dt><dd>The side of the rink away from the ball.</dd></div>
              </dl>
            </details>

            <details class="terminology-reference__group">
              <summary>Position &amp; Direction</summary>
              <dl class="terminology-reference__terms">
                <div class="terminology-reference__term"><dt>Back Door</dt><dd>The far side of the net away from the ball.</dd></div>
                <div class="terminology-reference__term"><dt>Gap</dt><dd>The distance between a defender and the ball carrier.</dd></div>
                <div class="terminology-reference__term"><dt>Inside Out</dt><dd>Protect the middle first, then pressure toward the outside.</dd></div>
                <div class="terminology-reference__term"><dt>Net Side</dt><dd>Positioned between your opponent and your own net.</dd></div>
              </dl>
            </details>

            <details class="terminology-reference__group">
              <summary>Ball Movement</summary>
              <dl class="terminology-reference__terms">
                <div class="terminology-reference__term"><dt>Area Pass</dt><dd>A pass into open space for a teammate to run onto rather than directly to their stick.</dd></div>
                <div class="terminology-reference__term"><dt>Chip</dt><dd>Move the ball a short distance past pressure and into open space.</dd></div>
                <div class="terminology-reference__term"><dt>Cycle</dt><dd>Move the ball down the wall while teammates rotate into supporting positions.</dd></div>
                <div class="terminology-reference__term"><dt>D-to-D</dt><dd>A pass between the two defenders.</dd></div>
                <div class="terminology-reference__term"><dt>Drive the Net</dt><dd>Run hard to the front of the net for a pass or rebound.</dd></div>
                <div class="terminology-reference__term"><dt>Dump</dt><dd>Send the ball deep into the offensive zone instead of carrying it in.</dd></div>
                <div class="terminology-reference__term"><dt>Outlet</dt><dd>A safe passing option that helps begin the breakout.</dd></div>
                <div class="terminology-reference__term"><dt>Reverse</dt><dd>Change the direction of the play behind the net to move the ball away from pressure.</dd></div>
                <div class="terminology-reference__term"><dt>Ring the Ball</dt><dd>Play the ball around the boards behind the net.</dd></div>
                <div class="terminology-reference__term"><dt>Screen</dt><dd>Position yourself in front of the goalie to block their view.</dd></div>
                <div class="terminology-reference__term"><dt>Stretch</dt><dd>Move up the rink to create a longer passing option.</dd></div>
                <div class="terminology-reference__term"><dt>Tape-to-Tape</dt><dd>A pass delivered directly to a teammate's stick so they can receive it cleanly without adjusting.</dd></div>
                <div class="terminology-reference__term"><dt>Transition</dt><dd>The moment possession changes from one team to the other.</dd></div>
                <div class="terminology-reference__term"><dt>Wheel</dt><dd>Carry the ball behind your own net and continue up the other side.</dd></div>
              </dl>
            </details>

            <details class="terminology-reference__group">
              <summary>Defensive Actions</summary>
              <dl class="terminology-reference__terms">
                <div class="terminology-reference__term"><dt>Active Stick</dt><dd>Keep your stick engaged to disrupt passes, challenge the ball, and limit options.</dd></div>
                <div class="terminology-reference__term"><dt>Box Out</dt><dd>Use body position to move or keep an opponent away from the House or Front Door.</dd></div>
                <div class="terminology-reference__term"><dt>Contain</dt><dd>Prevent the ball carrier from attacking a dangerous area without overcommitting.</dd></div>
                <div class="terminology-reference__term"><dt>Find Your Check</dt><dd>Identify the opponent you are responsible for defending.</dd></div>
                <div class="terminology-reference__term"><dt>Force Wide</dt><dd>Guide the ball carrier toward the boards and away from the middle.</dd></div>
                <div class="terminology-reference__term"><dt>Gap Up</dt><dd>Reduce the distance to the ball carrier under control.</dd></div>
                <div class="terminology-reference__term"><dt>Get in the Shooting Lane</dt><dd>Position your body between the shooter and the net.</dd></div>
                <div class="terminology-reference__term"><dt>Pick Up the Trailer</dt><dd>Identify and cover the late player joining the attack.</dd></div>
                <div class="terminology-reference__term"><dt>Pinch</dt><dd>A defender moves down the boards to pressure the play or keep the ball in the offensive zone.</dd></div>
                <div class="terminology-reference__term"><dt>Stick in the Passing Lane</dt><dd>Position your stick in the path between the ball carrier and a potential receiver.</dd></div>
                <div class="terminology-reference__term"><dt>Take Away the Middle</dt><dd>Protect the central area before pressuring toward the outside.</dd></div>
                <div class="terminology-reference__term"><dt>Tie Up</dt><dd>Limit an opponent's ability to play the ball by controlling their stick or body.</dd></div>
              </dl>
            </details>

            <details class="terminology-reference__group">
              <summary>Contextual Roles</summary>
              <dl class="terminology-reference__terms">
                <div class="terminology-reference__term"><dt>Situational Roles</dt><dd><p>Labels such as <strong>F1</strong>, <strong>F2</strong>, <strong>F3</strong>, <strong>D1</strong>, and <strong>D2</strong> describe responsibilities in the current situation, not fixed positions.</p><p>The role depends on each player's location in relation to the ball, the play, and their teammates.</p></dd></div>
                <div class="terminology-reference__term"><dt>D1 and D2</dt><dd><p><strong>D1</strong> is the defender most directly involved with the ball or immediate pressure.</p><p><strong>D2</strong> is the second defender providing net-front, middle, weak-side, or underneath support.</p><p>These roles change as the play develops.</p></dd></div>
                <div class="terminology-reference__term"><dt>F1, F2 and F3</dt><dd><p><strong>F1</strong> is the first forward involved in the play.</p><p><strong>F2</strong> is the second forward supporting or anticipating the next play.</p><p><strong>F3</strong> is the third forward providing balance, weak-side support, or defensive safety.</p><p>These roles change as the play develops.</p></dd></div>
              </dl>
            </details>
          </div>
        </section>
      `;
    }

    function renderSystemsContent() {
      const allItems = [...systemItems, ...referenceItems];
      const activeItem = allItems.find((item) => item.id === appState.activeSystem);
      const contentPanel = document.getElementById("systems-content-panel");
      const mobileHint = document.getElementById("systems-mobile-hint");
      const placeholderNote = document.getElementById("systems-placeholder-note");
      const isNeutralZoneTrap = appState.activeSystem === "neutral-zone-forecheck";
      const isDZoneCoverage = appState.activeSystem === "d-zone-coverage";
      const isDZoneBreakout = appState.activeSystem === "d-zone-breakout";
      const isDZoneFaceoff = appState.activeSystem === "d-zone-faceoff";
      const isBackcheck = appState.activeSystem === "backchecking";
      const isLineChanges = appState.activeSystem === "line-changes";
      const isOZoneEntry = appState.activeSystem === "o-zone-entry";
      const isOZoneForecheck = appState.activeSystem === "o-zone-forecheck";
      const isOZoneAttack = appState.activeSystem === "o-zone-offense";
      const isOZoneFaceoff = appState.activeSystem === "o-zone-faceoff";
      const isCommunication = appState.activeSystem === "communication";
      const isTerminology = appState.activeSystem === "terminology";
      const isCompleteSystem = isNeutralZoneTrap || isDZoneCoverage || isDZoneBreakout || isDZoneFaceoff || isBackcheck || isLineChanges || isOZoneEntry || isOZoneForecheck || isOZoneAttack || isOZoneFaceoff || isCommunication || isTerminology;

      if (mobileHint) {
        mobileHint.textContent = `Current topic: ${activeItem.label}`;
      }

      if (placeholderNote) {
        placeholderNote.style.display = isCompleteSystem ? "none" : "inline-flex";
        placeholderNote.setAttribute("aria-hidden", isCompleteSystem ? "true" : "false");
      }

      if (isCommunication) {
        renderCommunicationReference();
        return;
      }

      if (isTerminology) {
        renderTerminologyReference();
        return;
      }

      if (isDZoneCoverage) {
        renderDZoneCoverage();
        return;
      }

      if (isDZoneBreakout) {
        renderDZoneBreakout();
        return;
      }

      if (isDZoneFaceoff) {
        renderDZoneFaceoff();
        return;
      }

      if (isBackcheck) {
        renderBackcheck();
        return;
      }

      if (isLineChanges) {
        renderLineChanges();
        return;
      }

      if (isOZoneEntry) {
        renderOZoneEntry();
        return;
      }

      if (isOZoneForecheck) {
        renderOZoneForecheck();
        return;
      }

      if (isOZoneAttack) {
        renderOZoneAttack();
        return;
      }

      if (isOZoneFaceoff) {
        renderOZoneFaceoff();
        return;
      }

      if (isNeutralZoneTrap) {
        renderNeutralZoneTrap();
        return;
      }

      contentPanel.innerHTML = `
        <div class="systems-placeholder-box">
          <div class="systems-wip-banner" role="status">
            <span class="systems-wip-banner__icon" aria-hidden="true">🚧</span>
            <div>
              <strong>${activeItem.label} — Work in Progress</strong>
              <p>This coaching page is still being built. Check back for the completed system.</p>
            </div>
          </div>
        </div>
      `;
    }


    function bindSystemsSidebarScrollChaining() {
      const sidebar = document.querySelector(".systems-sidebar");
      if (!sidebar) return;

      sidebar.addEventListener("wheel", (event) => {
        const canScrollInternally = sidebar.scrollHeight > sidebar.clientHeight;
        if (!canScrollInternally) return;

        const scrollingDown = event.deltaY > 0;
        const scrollingUp = event.deltaY < 0;
        const atTop = sidebar.scrollTop <= 0;
        const atBottom = Math.ceil(sidebar.scrollTop + sidebar.clientHeight) >= sidebar.scrollHeight;

        if ((scrollingDown && atBottom) || (scrollingUp && atTop)) {
          event.preventDefault();
          window.scrollBy({
            top: event.deltaY,
            left: 0,
            behavior: "auto"
          });
        }
      }, { passive: false });
    }

    /* =========================================================
       Event Binding
       ========================================================= */
    function bindPrimaryNavigation() {
      document.querySelectorAll("[data-primary-target]").forEach((button) => {
        button.addEventListener("click", () => {
          appState.activePrimary = button.dataset.primaryTarget;
          updatePrimaryView();
        });
      });
    }

    function bindNorthStarNavigation() {
      document.querySelectorAll("[data-north-star-target]").forEach((button) => {
        button.addEventListener("click", () => {
          appState.activeNorthStar = button.dataset.northStarTarget;
          setActiveButton("[data-north-star-target]", "northStarTarget", appState.activeNorthStar);
          renderNorthStarContent();
        });
      });
    }

    function updatePrimaryView() {
      document.querySelectorAll(".view").forEach((view) => {
        view.classList.remove("is-active");
      });

      document.getElementById(`view-${appState.activePrimary}`).classList.add("is-active");
      setActiveButton("[data-primary-target]", "primaryTarget", appState.activePrimary);
    }

    /* =========================================================
       System Image Preloading
       ========================================================= */
    const preloadedSystemImages = [];

    function preloadSystemImages() {
      const systemsWithImages = [
        dZoneCoverage,
        dZoneBreakout,
        dZoneFaceoff,
        oZoneFaceoff,
        neutralZoneTrap,
        backcheck
      ];

      const imageSources = [
        ...new Set(
          systemsWithImages.flatMap((system) =>
            (system.steps || system.frames || [])
              .map((step) => step.image)
              .filter(Boolean)
          )
        )
      ];

      imageSources.forEach((src) => {
        const image = new Image();
        image.src = src;
        preloadedSystemImages.push(image);
      });
    }

    /* =========================================================
       App Initialization
       ========================================================= */
    function initApp() {
      preloadSystemImages();
      bindPrimaryNavigation();
      bindNorthStarNavigation();
      bindSystemsSidebarScrollChaining();
      renderNorthStarContent();
      renderSystemsNavigation();
      renderSystemsContent();
      updatePrimaryView();
    }

    initApp();
  </script>
</body>
</html>
